<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>MARGARIDA - Sistema</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>🦉 MARGARIDA</h2>

  <button onclick="abrirAba('alunos')">📋 Alunos</button>
  <button onclick="abrirAba('chamada')">📌 Chamada</button>
  <button onclick="abrirAba('turmas')">🏫 Turmas</button>

  <hr>

  <button onclick="sair()">🚪 Sair</button>

</div>

<!-- CONTEÚDO -->
<div class="content">

  <!-- ALUNOS -->
<div id="alunos" class="section">
  <h2>Lista de Alunos</h2>

<div class="topo-alunos">

  <div class="busca-box">
    🔍
    <input type="text" id="busca" placeholder="Buscar aluno..." onkeyup="filtrarAlunos()">
  </div>

  <button onclick="novoAluno()">+ Novo</button>

</div>

  <table class="tabela">
    <thead>
      <tr>
        <th>Nome</th>
        <th>RA</th>
        <th>Turma</th>
        <th>Sala</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody id="alunos-lista"></tbody>
  </table>
</div>

  <!-- CHAMADA -->
  <div id="chamada" class="section oculto">
    <h2>Chamada</h2>
    <p>Em construção...</p>
    <div id="lista-chamada"></div>
  </div>

  <!-- TURMAS (FUTURO) -->
  <div id="turmas" class="section oculto">
    <h2>Turmas</h2>
    <p>Em construção...</p>
  </div>

</div>

<!-- PRONTUÁRIO (CARD FLUTUANTE) -->
<div id="card-aluno" class="card-aluno oculto"></div>

<!-- JS -->
<script src="js/login.js"></script>
<script src="js/alunos.js"></script>

<script>
/* proteção simples */
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

function sair() {
  localStorage.clear();
  window.location.href = "login.html";
}

function abrirAba(id) {

  document.querySelectorAll(".section").forEach(s => s.classList.add("oculto"));
  document.getElementById(id).classList.remove("oculto");

}
</script>

</body>
</html>
